; extensions_mobile.conf - Mobile device dialplan for chan_mobile testing
;
; Include this file in your extensions.conf:
;   #include extensions_mobile.conf
;
; Or copy these contexts to your extensions.conf

; ============================================================================
; Context for incoming calls FROM mobile device
; ============================================================================
[from-mobile]
; Answer and play a message for incoming calls
exten => s,1,NoOp(Incoming call from mobile device)
    same => n,Answer()
    same => n,Wait(1)
    same => n,Playback(hello-world)
    same => n,Hangup()

; Catch-all for any extension
exten => _X.,1,NoOp(Incoming call to ${EXTEN} from mobile)
    same => n,Answer()
    same => n,Wait(1)
    same => n,Playback(hello-world)
    same => n,Hangup()

; ============================================================================
; Context for making outgoing calls TO mobile device
; ============================================================================
[to-mobile]
; Dial out via mobile device W350i
; Usage: Dial(Mobile/W350i/+1234567890)
exten => _X.,1,NoOp(Outgoing call to ${EXTEN} via mobile)
    same => n,Dial(Mobile/W350i/${EXTEN},60,r)
    same => n,Hangup()

; ============================================================================
; Test context - for testing mobile functionality
; ============================================================================
[mobile-test]
; Extension 100 - Test outgoing call (dial a number)
; Change the number to your test number!
exten => 100,1,NoOp(Test outgoing call via mobile)
    same => n,Answer()
    same => n,Playback(beep)
    same => n,Dial(Mobile/W350i/+381641234567,60,r)
    same => n,Hangup()

; Extension 101 - Check mobile device status
exten => 101,1,NoOp(Check mobile status)
    same => n,Answer()
    same => n,Set(STATUS=${MOBILE_STATUS(W350i)})
    same => n,NoOp(Mobile status: ${STATUS})
    same => n,GotoIf($["${STATUS}" = "1"]?disconnected)
    same => n,GotoIf($["${STATUS}" = "2"]?free)
    same => n,GotoIf($["${STATUS}" = "3"]?busy)
    same => n,Playback(an-error-has-occurred)
    same => n,Hangup()
    same => n(disconnected),Playback(vm-goodbye)
    same => n,Hangup()
    same => n(free),Playback(beep)
    same => n,Playback(auth-thankyou)
    same => n,Hangup()
    same => n(busy),Playback(vm-isonphone)
    same => n,Hangup()

; Extension 102 - Send test SMS
exten => 102,1,NoOp(Send test SMS)
    same => n,Answer()
    same => n,MobileSendSMS(W350i,+381641234567,Test message from Asterisk)
    same => n,Playback(beep)
    same => n,Hangup()

; Extension 103 - Echo test (if mobile connected, echo audio back)
exten => 103,1,NoOp(Echo test via mobile)
    same => n,Answer()
    same => n,Playback(demo-echotest)
    same => n,Echo()
    same => n,Hangup()

; Extension 199 - Dial entered number via mobile
; Prompts for digits, then dials
exten => 199,1,NoOp(Dial via mobile - enter number)
    same => n,Answer()
    same => n,Read(DEST,vm-enter-num-to-call,15)
    same => n,GotoIf($["${DEST}" = ""]?hangup)
    same => n,NoOp(Dialing ${DEST} via mobile)
    same => n,Dial(Mobile/W350i/${DEST},60,r)
    same => n(hangup),Hangup()

; ============================================================================
; Default context - route calls to mobile
; ============================================================================
[default]
; Include mobile test extensions
include => mobile-test

; Route external numbers via mobile (example patterns)
; Adjust patterns for your country/needs

; Serbian mobile numbers (06x xxx xxxx)
exten => _06XXXXXXXX,1,NoOp(Serbian mobile: ${EXTEN})
    same => n,Dial(Mobile/W350i/${EXTEN},60,r)
    same => n,Hangup()

; Serbian landline (0xx xxx xxxx)  
exten => _0XXXXXXXXX,1,NoOp(Serbian landline: ${EXTEN})
    same => n,Dial(Mobile/W350i/${EXTEN},60,r)
    same => n,Hangup()

; International format (+xxx...)
exten => _+X.,1,NoOp(International: ${EXTEN})
    same => n,Dial(Mobile/W350i/${EXTEN},60,r)
    same => n,Hangup()
